# Ranch OS — explicit NTP server list for systemd-timesyncd.
#
# Buildroot's systemd may not have been compiled with built-in fallback
# NTP servers (the --with-ntp-servers configure option). Without them,
# /etc/systemd/timesyncd.conf is effectively empty and timesyncd silently
# does nothing on boot — leaving the Pi's clock in 1970 / "last persisted
# wall time," which then breaks TLS to api.telegram.org.
#
# We list a small mix of geographically-diverse pools and well-known
# stratum-1 services so a single provider outage doesn't leave the
# device stranded. FallbackNTP is used only if no NTP servers came in
# via DHCP option 42 / NetworkManager; if your home router advertises
# one, that takes priority and these are the safety net.

[Time]
FallbackNTP=time.cloudflare.com time.google.com pool.ntp.org time.nist.gov
