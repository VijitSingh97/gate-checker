# Force NetworkManager to write /etc/resolv.conf directly with the DNS
# servers from the active connection's DHCP lease.
#
# Why we need this: Buildroot ships NetworkManager configured for
# rc-manager=auto, which on a system without systemd-resolved (we disabled
# it for size in base.fragment) and without `resolvconf`/`netconfig`
# helpers (we don't ship those either) ends up doing nothing useful with
# /etc/resolv.conf. Result: getaddrinfo() can't resolve anything, and
# base-station can't reach api.telegram.org.
#
# Setting rc-manager=file is the universally-portable answer: NM writes
# /etc/resolv.conf as a plain file, libc's resolver reads it, done.
[main]
dns=default
rc-manager=file
